name: 'Repository Create'
description: >
  Creates a GitHub organization repository with overrideable
  pre-defined settings and branch rulesets.
author: stairwaytowonderland
inputs:
  github-token:
    description: >
      GitHub token with repo and admin:org scopes. Use a Personal Access Token
      or a GitHub App installation token. Note: the default GITHUB_TOKEN does
      not have admin:org scope and cannot create organization repositories —
      supply a token with the required scopes.
    required: true
    default: ${{ github.token }}

  org:
    description: Target GitHub organization.
    required: true

  name:
    description: Repository name to create.
    required: true

  repo-config:
    description: >
      Path to a JSON settings/rulesets override file, relative to the workspace
      root (GITHUB_WORKSPACE). Omit to use built-in defaults.

  template-owner:
    description: >
      Owner of the template repository. Requires template-repo to also be set.
      Takes precedence over any template configured in repo-config.

  template-repo:
    description: >
      Name of the template repository. Requires template-owner to also be set.
      The template repository must have "Template repository" enabled in its
      settings.

  visibility:
    description: >
      Repository visibility. One of: private, internal, public.
      'internal' requires GitHub Enterprise Cloud (GHEC).
      Overrides the value in repo-config if set.
    default: 'public'

  include-all-branches:
    description: >
      When creating from a template, copy all branches instead of only the
      default branch.

  job-summary:
    description: Write a job summary to the GitHub Actions step summary.
    default: 'true'

  create-from-template-retry-delay:
    description: >
      Time in milliseconds to wait before retrying repository creation if a
      template is being used and the API returns a 422 error indicating the
      template is still being processed. Default: 3000 (3 seconds).
    default: '3000'

  create-from-template-max-retries:
    description: >
      Maximum number of retries if a template is being used and the API returns a
      422 error indicating the template is still being processed. Default: 10.
    default: '10'

  replace-git-protocol-links:
    description: >
      Optional flag to also replace Git protocol links (e.g. git://) in the README.

  create-labels:
    description: >
      Optional flag to create a default set of issue labels in the new repository.

  create-issues:
    description: >
      Optional flag to create a default issue in the new repository.

outputs:
  repo-id:
    description: Numeric ID of the created repository.

  repo-url:
    description: HTML URL of the created repository (e.g. https://github.com/org/repo).

  repo-full-name:
    description: Full name of the created repository (e.g. org/repo).

  repo-name:
    description: Name of the created repository (e.g. repo).

  repo-owner-id:
    description: Numeric ID of the repository owner (e.g. organization or user ID).

  repo-owner-name:
    description: Name of the repository owner (e.g. organization or user name).

  repo-owner-url:
    description: URL of the repository owner (e.g. https://github.com/org).

runs:
  using: node24
  main: dist/index.js

branding:
  icon: git-branch
  color: red
