name: Create Repository

on:
  workflow_call:
    inputs:
      name:
        description: Repository name
        required: true
        type: string

      org:
        description: Target organization (leave blank to create under the org / user account)
        required: false
        type: string

      repo-config:
        description: >
          Path to a JSON config override file, relative to the repo root.
          Leave blank to use built-in defaults.
        required: false
        default: config/config.json
        type: string

      template-owner:
        description: Template repository owner (leave blank to skip template)
        required: false
        default: ''
        type: string

      template-repo:
        description: Template repository name (leave blank to skip template)
        required: false
        default: ''
        type: string

      include-all-branches:
        description: Copy all template branches (default — main branch only)
        required: false
        default: false
        type: boolean

      visibility:
        description: >
          Repository visibility. One of: private, internal, public.
          'internal' requires GitHub Enterprise Cloud (GHEC).
          Overrides the value in repo-config if set.
        required: false
        default: 'public'
        type: string

      job-summary:
        description: Write a job summary to the GitHub Actions step summary.
        required: false
        default: true
        type: boolean

jobs:
  create:
    name: Create ${{ inputs.org || github.repository_owner }}/${{ inputs.name }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create repository
        id: create
        uses: ./
        with:
          # ── Auth ────────────────────────────────────────────────────────────
          # Replace with a GitHub App installation token when App auth is ready.
          # GITHUB_TOKEN does not have admin:org scope — use a PAT stored as a
          # repository secret with repo + admin:org scopes.
          github-token: ${{ secrets.GH_PAT_CREATE_REPO }}

          # ── Required ────────────────────────────────────────────────────────
          org: ${{ inputs.org || github.repository_owner || github.repository_owner }}
          name: ${{ inputs.name }}

          # ── Optional ────────────────────────────────────────────────────────
          repo-config: ${{ inputs.repo-config }}
          template-owner: ${{ inputs.template-repo != '' && (inputs.template-owner || github.repository_owner) || '' }}
          template-repo: ${{ inputs.template-repo }}
          include-all-branches: ${{ inputs.include-all-branches }}
          visibility: ${{ inputs.visibility }}
          job-summary: ${{ inputs.job-summary }}

      - name: Summary
        if: ${{ inputs.job-summary != true }}
        run: |
          echo "## Repository Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.create.outputs.repo-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Name:** \`${{ steps.create.outputs.repo-name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
