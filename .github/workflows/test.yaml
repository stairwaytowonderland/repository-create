name: Test

on:
  pull_request:
    paths:
      - 'src/**'
      - 'package*.json'
      - 'action.yaml'
  workflow_dispatch:

jobs:
  build:
    name: Bundle dist/index.cjs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Semantic release
        id: release
        uses: ./.github/actions/node-semantic-release
        with:
          build-only: true

      - name: Type check
        run: npm run typecheck
